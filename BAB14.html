  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bab14</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal: "위치", jawaban: "lokasi" },
{ soal: "오른쪽", jawaban: "arah kanan" },
{ soal: "길찾기", jawaban: "mencari jalan" },
{ soal: "건너편", jawaban: "di seberang jalan" },
{ soal: "맞은편", jawaban: "di seberang jalan" },
{ soal: "사거리", jawaban: "perempatan" },
{ soal: "이쪽", jawaban: "arah ini" },
{ soal: "올라오다", jawaban: "datang naik" },
{ soal: "저쪽", jawaban: "arah itu" },
{ soal: "들어가다", jawaban: "pergi masuk" },
{ soal: "그쪽", jawaban: "arah tersebut" },
{ soal: "방향", jawaban: "arah" },
{ soal: "어느쪽", jawaban: "arah mana" },
{ soal: "나가다", jawaban: "pergi keluar" },
{ soal: "층", jawaban: "lantai" },
{ soal: "나오다", jawaban: "datang keluar" },
{ soal: "지하", jawaban: "bawah tanah" },
{ soal: "의자위", jawaban: "di atas kursi" },
{ soal: "근처", jawaban: "sekitar" },
{ soal: "아래", jawaban: "bawah" },
{ soal: "밑", jawaban: "bawah" },
{ soal: "도로명", jawaban: "nama jalan" },
{ soal: "건너다", jawaban: "menyeberang" },
{ soal: "횡단하다", jawaban: "menyeberang" },
{ soal: "주소", jawaban: "alamat" },
{ soal: "앞", jawaban: "depan" },
{ soal: "표기하다", jawaban: "menandai" },
{ soal: "횡단보도", jawaban: "zebra cross" },
{ soal: "점차", jawaban: "perlahan" },
{ soal: "뒤", jawaban: "belakang" },
{ soal: "시 / 도", jawaban: "kota / provinsi" },
{ soal: "육교", jawaban: "jembatan penyeberangan" },
{ soal: "해당", jawaban: "terkait / sesuai" },
{ soal: "안", jawaban: "dalam" },
{ soal: "대로", jawaban: "jalan raya" },
{ soal: "옥상", jawaban: "atap" },
{ soal: "좁은길", jawaban: "jalan sempit" },
{ soal: "밖", jawaban: "luar" },
{ soal: "표시하다", jawaban: "menunjukan / menandakan" },
{ soal: "옆", jawaban: "samping" },
{ soal: "내려가다", jawaban: "pergi turun" },
{ soal: "사이", jawaban: "antara" },
{ soal: "내려오다", jawaban: "datang turun" },
{ soal: "왼쪽", jawaban: "arah kiri" },
{ soal: "올라가다", jawaban: "pergi naik" },
{ soal: "건물", jawaban: "gedung" },

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
